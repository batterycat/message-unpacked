name: Bug report
description: Report a reproducible problem in the learning or teacher flow.
title: '[Bug] '
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Do not attach real scam messages containing names, account details, phone numbers, or active malicious links.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open …
        2. Select …
        3. Observe …
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser and device
      placeholder: Safari 19 on iPad, Chrome 140 on Windows, etc.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: This report contains no student data or active suspicious link.
          required: true
