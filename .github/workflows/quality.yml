name: Quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - run: npm install --global pnpm@11.9.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm peers check
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm worker:typecheck
      - run: pnpm schema:check
      - name: Validate case editorial rules and coverage
        run: pnpm validate:content
      - run: pnpm test
      - run: pnpm test:worker
      - run: pnpm license:check
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - run: pnpm build:subpath
      - run: pnpm check:subpath
