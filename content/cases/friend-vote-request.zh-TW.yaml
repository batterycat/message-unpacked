translationGroupId: friend-vote-request
locale: zh-TW
status: published
title: 同學傳來的投票邀請
channel: chat
classification: insufficient-evidence
provenance:
  kind: classic-pattern
  note: 綜整社群帳號遭盜後冒用熟人身分、要求投票或提供驗證碼的常見手法。
sources: []
learning:
  stages: [7-9]
  dimensions: [prevention, response]
  topic: 社群與交友
  readingLevel: standard
  difficulty: intermediate
  contexts: [社群平台, 同儕互動]
  skills: [跨管道確認身分, 保護驗證碼]
  riskTypes: [熟人冒用, 帳號竊取]
  sensitiveContent: []
  trustedAdultRecommended: false
messages:
  - id: message.vote
    sender: 阿哲
    body: 可以幫我投社團比賽嗎？進 https://club-vote.example.com 後把收到的六位數驗證碼傳給我，剩五分鐘而已！
    timestamp: '20:08'
    direction: incoming
clues:
  - id: clue.code
    label: 要求轉交驗證碼
    explanation: 驗證碼通常用來證明帳號操作是本人進行，不應交給任何人，包括認識的人。
  - id: clue.identity
    label: 熟悉的帳號不等於本人
    explanation: 帳號可能遭盜用；可以改用電話、當面或其他既有管道確認。
choices:
  - id: choice.trustworthy
    label: 是認識的人，可以幫忙
    classification: trustworthy
    reasoning: 熟人帳號也可能遭盜用，而且驗證碼不應轉交。
    score: 0
  - id: choice.fraud
    label: 一定是本人在詐騙，立刻公開指責
    classification: fraud
    reasoning: 訊息高度可疑，但目前無法確認是本人、帳號遭盜或其他狀況；公開指責也可能傷害無辜者。
    score: 55
  - id: choice.verify
    label: 不給驗證碼，改用其他方式確認本人
    classification: insufficient-evidence
    reasoning: 你先保護帳號秘密，再透過獨立管道確認身分與請求。
    score: 100
recommendedActionIds: [anti-fraud.consult]
debrief:
  headline: 身分不確定時，先切換查證管道
  explanation: 真正的同學可能需要幫忙，也可能是帳號被盜。你不需要先猜中真相；拒絕提供驗證碼並換管道確認，就能安全處理資訊不足的狀況。
  safeActions:
    - 不提供密碼、驗證碼或帳號復原連結。
    - 打電話、當面或從另一個已知帳號確認本人。
    - 若確認帳號遭盜，提醒同學進行帳號復原並通知其他聯絡人。
review:
  lastReviewedAt: 2026-07-18
  maintenanceStatus: active
