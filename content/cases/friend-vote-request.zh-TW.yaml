title: 同學傳來的投票邀請
channel: chat
classification: fraud
provenance:
  kind: classic-pattern
  note: 綜整社群帳號遭盜後冒用熟人身分、要求投票或提供驗證碼的常見手法。
sources: []
learning:
  stages: [7-9]
  dimensions: [prevention, response]
  topic: 社群與交友
  readingLevel: standard
  difficulty: intermediate
  contexts: [社群平台, 同儕互動]
  skills: [跨管道確認身分, 保護驗證碼]
