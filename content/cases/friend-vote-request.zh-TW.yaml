messages:
  - id: message.vote
    sender: 阿哲
    body: 可以幫我投社團比賽嗎？進 https://club-vote.example.com 後把收到的六位數驗證碼傳給我，剩五分鐘而已！
    timestamp: '20:08'
    direction: incoming
clues:
  - id: clue.code
    label: 要求轉交驗證碼
    explanation: 驗證碼通常用來證明帳號操作是本人進行，不應交給任何人，包括認識的人。
  - id: clue.identity
    label: 熟悉的帳號不等於本人
    explanation: 帳號可能遭盜用。判定訊息是詐騙，不等於指控你的同學——很可能傳訊息的根本不是他。
choices:
  - id: choice.trustworthy
    label: 是認識的人，可以幫忙
    classification: trustworthy
    reasoning: 熟人帳號也可能遭盜用，而且驗證碼不應轉交給任何人。
    score: 0
  - id: choice.fraud
    label: 索取驗證碼就是詐騙訊息，不提供，並改用其他管道確認阿哲本人
    classification: fraud
    reasoning: 你辨識出「投票卻要驗證碼」的矛盾，也用獨立管道處理同學可能被盜帳號的狀況。
    score: 100
  - id: choice.verify
    label: 先進網站幫他投票，但不傳驗證碼
    classification: insufficient-evidence
    reasoning: 不傳驗證碼是對的，但那個網站正是用來觸發驗證碼的入口，沒有必要進去。
    score: 40
recommendedActionIds: [anti-fraud.online-report, anti-fraud.consult]
debrief:
  headline: 索取驗證碼的訊息，不論是誰傳的都是詐騙
  explanation: 幫忙投票不需要你的驗證碼，這個矛盾本身就足以判定。你不必先弄清楚是阿哲本人還是他的帳號被盜——把訊息判定為詐騙不等於指控同學，最可能的情況正是他的帳號出了問題，需要你用另一個管道提醒他。
  safeActions:
    - 不提供密碼、驗證碼或帳號復原連結。
    - 打電話、當面或從另一個已知帳號確認本人。
    - 若確認帳號遭盜，提醒同學進行帳號復原並通知其他聯絡人。
review:
