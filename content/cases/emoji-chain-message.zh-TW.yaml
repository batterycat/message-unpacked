title: 轉發表情符號才不會倒楣
channel: chat
classification: fraud
provenance:
  kind: classic-pattern
  note: 改寫利用厄運恐嚇與大量轉發的社群鏈式訊息。
sources: []
learning:
  stages: [3-4]
  dimensions: [prevention, ethics]
  topic: 社群與交友
  readingLevel: easy
  difficulty: introductory
  contexts: [社群聊天, 同儕互動]
  skills: [辨識情緒操弄, 不轉傳未證實訊息]
  riskTypes: [厄運恐嚇, 鏈式轉發]
  sensitiveContent: []
  trustedAdultRecommended: false
messages:
  - id: message.chain
    sender: 同學群組
    body: 快把這段表情符號轉給十個人，不然明天會遇到倒楣事！不能只看不轉喔！
    timestamp: '19:01'
    direction: incoming
clues:
  - id: clue.threat
    label: 用害怕倒楣催你轉發
    explanation: 讓人害怕或內疚是情緒操弄，不是可靠的消息證據。
  - id: clue.mass
    label: 要求轉給很多人
    explanation: 大量轉傳只會放大未經查證的內容，不能證明訊息是真的。
choices:
  - id: choice.trustworthy
    label: 趕快轉發，寧可信其有
    classification: trustworthy
    reasoning: 轉發會擴散沒有來源的恐嚇內容，也可能造成同學困擾。
    score: 0
  - id: choice.fraud
    label: 這是利用恐懼操弄的訊息，不轉傳並刪除
    classification: fraud
    reasoning: 你辨識出沒有證據、要求大量轉發與厄運威脅的組合。
    score: 100
  - id: choice.verify
    label: 先轉給一位最好的朋友問問看
    classification: insufficient-evidence
    reasoning: 即使只轉給一人仍會擴散未查證內容，應先停止轉發。
    score: 25
recommendedActionIds: []
debrief:
  headline: 害怕不是轉發的理由
  explanation: 鏈式訊息常用倒楣、孤單或內疚讓人轉傳。沒有可靠來源時，停止轉發就是保護自己與朋友。
  safeActions:
    - 不轉傳沒有來源的恐嚇訊息。
    - 如果內容讓你害怕，請找可信任的大人討論。
review:
