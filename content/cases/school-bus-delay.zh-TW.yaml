messages:
  - id: message.bus
    sender: 班導師
    body: 明天校車會因道路施工改在大門口停車。請把這則通知拿給家人看，老師不會在訊息裡要求密碼或費用。
    timestamp: '17:10'
    direction: incoming
clues:
  - id: clue.adult
    label: 鼓勵交給家人確認
    explanation: 低年級遇到接送變動，可以請家人或老師一起確認，不必自己處理。
  - id: clue.no-secret
    label: 沒有索取秘密資料
    explanation: 正常通知只說明安排，不會要求密碼、驗證碼或付款。
choices:
  - id: choice.trustworthy
    label: 先拿給家人看，再從學校熟悉的管道確認
    classification: trustworthy
    reasoning: 通知內容單純、沒有秘密要求，也提醒找可信任的大人確認。
    score: 100
  - id: choice.fraud
    label: 這一定是詐騙，馬上把老師封鎖
    classification: fraud
    reasoning: 沒有足夠證據判定是詐騙，直接封鎖可能錯過重要校園通知。
    score: 20
  - id: choice.verify
    label: 不告訴家人，自己回覆個人資料確認
    classification: insufficient-evidence
    reasoning: 不應私下提供個資；應改由家人或學校既有管道協助確認。
    score: 45
recommendedActionIds: []
debrief:
  headline: 接送通知要和可信任的大人一起確認
  explanation: 看到校園安排變動時，先讓家人或老師知道，並使用原本熟悉的管道確認，不需要提供秘密資料。
  safeActions:
    - 把訊息拿給家人或老師看。
    - 不提供密碼、驗證碼或住家詳細資料。
