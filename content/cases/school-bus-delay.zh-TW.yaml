messages:
  - id: message.bus
    sender: 班導師
    body: 明天校車會因道路施工改在大門口停車。請把這則通知拿給家長看，學校的接送公告也會一起更新。
    timestamp: '17:10'
    direction: incoming
clues:
  - id: clue.adult
    label: 鼓勵交給家長確認
    explanation: 低年級遇到接送變動，可以請家長或老師一起確認，不必自己處理。
  - id: clue.no-secret
    label: 沒有索取秘密資料
    explanation: 這則通知只說明明天的安排，實際上沒有要密碼、驗證碼或錢。
choices:
  - id: choice.trustworthy
    label: 先拿給家長看，再從學校熟悉的管道確認
    classification: trustworthy
    reasoning: 通知內容單純、沒有秘密要求，也提醒找可信任的大人確認。
    score: 100
  - id: choice.fraud
    label: 這一定是詐騙，馬上把老師封鎖
    classification: fraud
    reasoning: 沒有足夠證據判定是詐騙，直接封鎖可能錯過重要校園通知。
    score: 20
  - id: choice.verify
    label: 不告訴家長，自己回覆個人資料確認
    classification: insufficient-evidence
    reasoning: 不可以自己把個人資料傳出去。這件事要讓家長知道，或用平常跟學校聯絡的方法確認。
    score: 15
debrief:
  headline: 接送通知要和可信任的大人一起確認
  explanation: 學校的安排有變動時，先讓家長或老師知道，再用平常的方法確認。你不需要給出任何秘密資料。
  safeActions:
    - 把訊息拿給家長或老師看。
    - 不提供密碼、驗證碼或住家詳細資料。
