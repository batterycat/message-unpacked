messages:
  - id: message.deadline
    sender: Student Aid Relief Dept
    body: FINAL NOTICE - Your student loans qualify for forgiveness under the new federal program, but enrollment closes at midnight. Secure your spot now.
    timestamp: '7:41 PM'
    direction: incoming
  - id: message.fee
    sender: Student Aid Relief Dept
