title: 網紅推薦的外匯機器人
channel: chat
classification: fraud
provenance:
  kind: classic-pattern
  note: 改寫名人或網紅推薦外匯機器人、保證收益並導向私人入金的手法。
sources: []
learning:
  stages: [7-9]
  dimensions: [prevention, response, ethics]
  topic: 投資與廣告
  readingLevel: standard
  difficulty: intermediate
  contexts: [社群廣告, 外匯投資, 網紅推薦]
  skills: [辨識保證獲利, 核對廣告身分, 拒絕私下入金]
