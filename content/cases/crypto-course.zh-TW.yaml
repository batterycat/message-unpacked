title: 免費加密貨幣課程的入金禮
channel: chat
classification: fraud
provenance:
  kind: classic-pattern
  note: 改寫以投資課程、保證獲利與入金禮誘導學生加入私人群組的手法。
sources: []
learning:
  stages: [7-9]
  dimensions: [prevention, response, ethics]
  topic: 投資與廣告
  readingLevel: standard
  difficulty: intermediate
  contexts: [社群廣告, 投資課程, 數位資產]
  skills: [辨識保證獲利話術, 拒絕私下投資, 找可信任的大人]
