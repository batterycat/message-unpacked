messages:
  - id: message.hire
    sender: campus.assistant.hiring@mail.example.net
    body: Congratulations — you're hired as my remote personal assistant, $450/week. First task is buying supplies for an event. I'm mailing you a check for $2,850.
    timestamp: 'Mon 9:04 AM'
    direction: incoming
  - id: message.forward
    sender: campus.assistant.hiring@mail.example.net
    body: Deposit it and check your balance — you'll see the funds. The vendor only takes Zelle, so send them $2,400 today and keep $450 as your first week's pay. Time sensitive.
    timestamp: 'Thu 8:12 AM'
    direction: incoming
clues:
  - id: clue.availability
    label: Money showing in your balance does not mean the check is good
    explanation: Banks must make funds available within days, but a forged check can bounce weeks later. Availability and clearing are two different things, and this scam lives in the gap between them.
  - id: clue.forward
    label: You are being asked to pass money onward
    explanation: The job is not the assistant work. The job is moving money out of your account to someone else, which is the only part they actually need from you.
  - id: clue.overpay
    label: The amount is deliberately too much
    explanation: Nobody accidentally sends a stranger $2,400 extra. The overpayment exists to create a reason for you to send real money back.
choices:
  - id: choice.trustworthy
    label: The money is in the account, so send the vendor their $2,400
    classification: trustworthy
    reasoning: When the check is found to be forged, the bank reverses the full amount and you owe every dollar you sent — the Zelle transfer is real and gone.
    score: 0
  - id: choice.fraud
    label: Recognize the overpayment pattern, send nothing, and take the check to your bank
    classification: fraud
    reasoning: You separated "funds available" from "check cleared," and refused the part that actually costs you — forwarding real money.
    score: 100
  - id: choice.verify
    label: Wait a few days for it to clear, then send the money
    classification: insufficient-evidence
    reasoning: Waiting is better than sending immediately, but a few days is not enough. Forged checks are often discovered two to four weeks later, and the pressure to hurry exists precisely because of that window.
    score: 40
recommendedActionIds: [anti-fraud.online-report, anti-fraud.consult]
debrief:
  headline: Available is not cleared
  explanation: This scheme has survived for decades because it exploits a banking rule most people have never had reason to learn. Your bank must let you access deposited funds quickly, but it can claw the money back whenever the check turns out to be forged — sometimes a month later. So the balance you see is real, the check is not, and the payment you send is very real. The tell is simple and does not require any of that knowledge, though. Any arrangement where money arrives and you are asked to pass most of it along is the same scheme wearing different clothes. Moving money for someone else can also expose you to account restrictions, investigation, and possible legal consequences. What a person knew and did matters, so the safe response is to stop before forwarding anything and ask a trusted adult or the bank for help.
  safeActions:
    - Never use money from a check sent by someone you do not know to pay or forward money to anyone else.
    - Do not accept a job that involves receiving and forwarding payments, however it is described.
    - Verify any employer through the school career office or a phone number you looked up yourself.
    - Tell your bank immediately if you already deposited the check or sent funds.
