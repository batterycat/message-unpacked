title: 遊戲好友送的禮物連結
channel: chat
classification: insufficient-evidence
provenance:
  kind: classic-pattern
  note: 綜整遊戲社群中真實送禮功能與冒名禮物連結難以分辨的情境。
sources: []
learning:
  stages: [7-9]
  dimensions: [prevention, response]
  topicId: gaming-accounts
  topic: 遊戲與帳號
  readingLevel: standard
  difficulty: intermediate
  contexts: [線上遊戲, 同儕互動, 帳號安全]
  skills: [使用遊戲內建功能查證, 跨管道確認身分]
