title: 造型交易的確認碼
channel: chat
classification: insufficient-evidence
provenance:
  kind: classic-pattern
  note: 綜整遊戲交易中以確認交易為名索取一次性驗證碼的手法。
sources: []
learning:
  stages: [5-6]
  dimensions: [prevention, response]
  topic: 遊戲與帳號
  readingLevel: standard
  difficulty: intermediate
  contexts: [遊戲交易, 同儕聊天]
  skills: [辨識驗證碼用途, 跨管道確認身分]
  riskTypes: [驗證碼竊取, 假交易]
