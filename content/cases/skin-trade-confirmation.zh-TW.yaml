  trustedAdultRecommended: true
messages:
  - id: message.trade
    sender: 交易夥伴
    body: 我已經把造型放進交易頁，請把手機收到的六位數確認碼貼給我，這樣系統才會完成交換。
    timestamp: '19:36'
    direction: incoming
clues:
  - id: clue.otp
    label: 要求轉交手機確認碼
    explanation: 一次性驗證碼是確認帳號操作用的秘密，不應轉交給聊天對象。
  - id: clue.platform
    label: 交易不在遊戲正式介面完成
    explanation: 離開官方交易流程後，對方的說法無法當作系統證明。
choices:
  - id: choice.trustworthy
    label: 把確認碼給對方，交易才不會失敗
    classification: trustworthy
    reasoning: 任何人要求驗證碼都不能直接照做，可能導致帳號被接管。
    score: 0
  - id: choice.fraud
    label: 索取確認碼就是詐騙，不提供並停止這筆交易
    classification: fraud
    reasoning: 官方交易流程不需要你把確認碼貼給對方，看到這個要求就足以判定。
    score: 100
  - id: choice.verify
    label: 先問對方是哪一筆交易編號，再決定要不要給
    classification: insufficient-evidence
    reasoning: 繼續在對方的聊天視窗裡追問，得到的答案仍由對方編造，無法驗證交易是否存在。
    score: 40
debrief:
  headline: 交易確認碼不是交易憑證
  explanation: 驗證碼是帳號安全機制，不是可以交給交易對象的收據。即使對方是你認識的玩家，只要開口要驗證碼，這則訊息就是詐騙——也有可能是他的帳號被盜了，傳訊息的並不是他本人。
  safeActions:
    - 不提供驗證碼或登入連結。
    - 保留對話，從官方遊戲介面確認交易狀態。
    - 若對方是認識的玩家，改用其他管道提醒他檢查帳號是否遭盜用。
