impact:
  eventSummary: The FBI warned that when banks block transfers to fraudulent crypto platforms, scammers send couriers to collect cash in person, using a code word or a dollar bill serial number to authenticate the handoff. Victims are frequently older adults.
  period: Alert I-061526-PSA, issued June 2026
  location: United States
  nonFinancialImpact: Victims see fabricated account balances that keep rising, and are told they must pay taxes or penalties before withdrawing, which restarts the cycle.
  sourceIds: [source.ic3.cash-couriers]
