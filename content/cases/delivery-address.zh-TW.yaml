id: delivery-address.zh-tw
schemaVersion: 1
contentVersion: 1.0.0
translationGroupId: delivery-address
locale: zh-TW
status: published
title: 包裹地址錯誤的補填通知
channel: sms
classification: fraud
provenance:
  kind: classic-pattern
  note: 改寫物流簡訊要求補填地址與信用卡驗證的釣魚手法。
sources: []
learning:
  stages: [5-6]
  dimensions: [prevention, response]
  topicId: online-shopping
  topic: 網路購物
  readingLevel: standard
  difficulty: introductory
  contexts: [物流, 網路購物, 簡訊]
  skills: [核對訂單, 檢查網址, 保護金融資料]
  riskTypes: [假物流, 地址蒐集, 釣魚連結]
  sensitiveContent: []
  trustedAdultRecommended: true
messages:
  - id: message.address
    sender: 配送中心
    body: 你的包裹地址不完整，請於兩小時內至 https://delivery.example.com 補填住址並支付 15 元驗證費。
    timestamp: '13:25'
    direction: incoming
clues:
  - id: clue.order
    label: 沒有提供訂單編號
    explanation: 沒有可核對的訂單資訊時，不能只憑包裹說法填寫住址。
  - id: clue.fee
    label: 補地址還要求驗證費
    explanation: 小額付款也是取得卡片或帳戶資料的入口，應從購物平台訂單查詢。
choices:
  - id: choice.trustworthy
    label: 先補地址並付 15 元，包裹比較不會退回
    classification: trustworthy
    reasoning: 來源與訂單未確認，不能因為金額小就交出住址與付款資料。
    score: 0
  - id: choice.fraud
    label: 高度疑似釣魚物流簡訊，不點連結
    classification: fraud
    reasoning: 陌生連結、短期限、補地址與付款要求是常見釣魚組合。
    score: 100
  - id: choice.verify
    label: 先點開網址看有沒有自己的姓名
    classification: insufficient-evidence
    reasoning: 可疑連結不需要開啟，應從購物平台或物流官方入口查詢。
    score: 40
debrief:
  headline: 包裹要對照訂單，不要對照簡訊
  explanation: 物流詐騙利用大家怕包裹退回的心理。從購物平台訂單或官方 App 確認，不要沿用簡訊連結。
  safeActions:
    - 不在陌生物流頁輸入住址或付款資料。
    - 先請家人確認近期是否真的有包裹。
review:
  lastReviewedAt: 2026-07-19
  maintenanceStatus: active
