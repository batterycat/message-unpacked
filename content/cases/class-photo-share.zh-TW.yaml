id: class-photo-share.zh-tw
schemaVersion: 1
contentVersion: 1.1.0
translationGroupId: class-photo-share
locale: zh-TW
status: published
title: 班級照片的分享連結
channel: chat
classification: insufficient-evidence
provenance:
  kind: fictional
  note: 為低年級練習在分享照片前確認對象與隱私而設計。
sources: []
learning:
  stages: [1-2]
  dimensions: [prevention, ethics]
  topic: 社群與交友
  readingLevel: easy
  difficulty: introductory
  contexts: [班級活動, 照片分享, 家庭]
  skills: [確認分享對象, 找可信任的大人]
  riskTypes: [陌生分享連結, 個人影像外流]
  sensitiveContent: []
  trustedAdultRecommended: true
messages:
  - id: message.photo
    sender: 活動攝影小幫手
    body: 今天的班級照片都在 https://class-photo.example.com 請輸入你的姓名和家長手機才能下載喔！
    timestamp: '18:20'
    direction: incoming
clues:
  - id: clue.data
    label: 下載照片卻要求家長手機
    explanation: 看照片不用給名字和電話。先讓家長或老師看看，到底是誰要收這些資料。
  - id: clue.unknown
    label: 不確定對方是不是班級成員
    explanation: 就算活動的名字很熟悉，也不代表這個連結是安全的，不可以自己填。
choices:
  - id: choice.trustworthy
    label: 填寫姓名和手機，才可以看到照片
    classification: trustworthy
    reasoning: 還不知道是誰要這些資料、要拿去做什麼，不可以先填。
    score: 0
  - id: choice.fraud
    label: 這一定是壞人傳的，不理它
    classification: fraud
    reasoning: 不填資料是對的。但照片可能真的是班上活動拍的，問一下老師或家長就知道，不會白白錯過。
    score: 60
  - id: choice.verify
    label: 不輸入資料，請家長或老師確認照片分享方式
    classification: insufficient-evidence
    reasoning: 先把自己的資料收好，再請大人幫你看這個連結，還有誰看得到照片。
    score: 100
recommendedActionIds: [anti-fraud.online-report, anti-fraud.consult]
debrief:
  headline: 照片分享也要先確認誰看得到
  explanation: 照片裡可能有你的臉、同學，還有制服。看到不認識的連結在跟你要資料，先拿給家長或老師看。
  safeActions:
    - 不要自己填姓名和家長的電話。
    - 先問清楚誰看得到、照片會存在哪裡，再下載。
    - 還不確定的時候，不要在群組說某個人是壞人，先問大人。
review:
  lastReviewedAt: 2026-07-20
  maintenanceStatus: active
