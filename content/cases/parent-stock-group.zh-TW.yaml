title: 家人被加入的股票群組
channel: chat
classification: insufficient-evidence
provenance:
  kind: classic-pattern
  note: 綜整假冒投資老師、用群組見證與飆股訊息建立信任的手法。
sources: []
learning:
  stages: [5-6]
  dimensions: [prevention, response, ethics]
  topicId: investment-advertising
  topic: 投資與廣告
  readingLevel: standard
  difficulty: intermediate
  contexts: [家庭, 股票群組, 聊天訊息]
  skills: [檢查群組假見證, 找可信任的大人, 拒絕私下投資]
  riskTypes: [假投資老師, 群組操弄, 名額催促]
  sensitiveContent: [金錢損失]
  trustedAdultRecommended: true
messages:
  - id: message.stock
    sender: 投資研究老師
    body: 你家長已被選入內部群組，明天這支股票一定上漲。請家長回覆身分證後四碼，才能保留名額。
    timestamp: '20:05'
    direction: incoming
clues:
  - id: clue.guarantee
    label: 宣稱明天一定上漲
    explanation: 沒有投資能保證結果，確定語氣不是證據。
  - id: clue.identity
    label: 要求身分證後四碼保留名額
    explanation: 還沒確認這個群組是誰開的，就不可以替家長回覆他的身分證號碼。
choices:
  - id: choice.trustworthy
    label: 先把家人的身分證後四碼傳過去
    classification: trustworthy
    reasoning: 不應替家人提供個資，也不能用保證上漲取代查證。
    score: 0
  - id: choice.fraud
    label: 一定是騙子，直接把家人退出群組就好
    classification: fraud
    reasoning: 警覺是對的。但擅自處理家人的帳號容易起爭執，也會失去對話紀錄；和家人一起看訊息、保留證據再查證更有效。
    score: 60
  - id: choice.verify
    label: 不回覆任何號碼，把訊息拿給家長看，讓他們自己決定
    classification: insufficient-evidence
    reasoning: 你不需要判斷這支股票好不好——那是家長的事。你要做的是不要替他們回覆，並且讓他們知道有這則訊息。
    score: 100
debrief:
  headline: 群組熱鬧不等於投資可靠
  explanation: 這則訊息要的是家長的資料，卻傳到了你這裡。你不需要自己判斷這支股票會不會漲——那超出你要負責的範圍。你要做的只有兩件事：不要替家長回覆任何號碼，然後把訊息拿給他們看。假投資群組會用假帳號、獲利截圖和肯定的語氣製造信任，「明天一定上漲」這種話本身就是警訊。
  safeActions:
    - 不替家長回覆身分證號碼，也不代為匯款。
    - 把訊息拿給家長看，提醒他們投資的事要從銀行或政府的官方網站查。
    - 不公開轉貼未經證實的群組名稱或他人個資，先保留截圖當證據。
review:
