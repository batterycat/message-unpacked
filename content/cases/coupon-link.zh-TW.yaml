messages:
  - id: message.coupon
    sender: 好康折價通知
    body: 生日免費折價券只到今天！點 https://coupon.example.com 填信用卡資料即可領取，快告訴家人一起用。
    timestamp: '15:02'
    direction: incoming
clues:
  - id: clue.card
    label: 領折價券卻要求信用卡資料
    explanation: 領折價券是店家給你錢，不需要你的卡號。這個矛盾就足以判定訊息是假的。
  - id: clue.deadline
    label: 用今天截止催促
    explanation: 限時優惠可能讓人跳過確認來源的步驟。
choices:
  - id: choice.trustworthy
    label: 趕快填卡號，免費折價券不能錯過
    classification: trustworthy
    reasoning: 尚未確認商店與表單，不能把信用卡資料交給陌生連結。
    score: 0
  - id: choice.fraud
    label: 領折價券不需要卡號，這是詐騙，不點連結並告訴家人
    classification: fraud
    reasoning: 你看出「免費」和「要卡號」互相矛盾，也把訊息交給大人，不用自己承擔判斷。
    score: 100
  - id: choice.verify
    label: 先點進去看看是不是真的商店，但不填卡號
    classification: insufficient-evidence
    reasoning: 不填卡號是對的，但頁面外觀可以完全複製，點進去看不出真假，沒有必要開啟。
    score: 40
debrief:
  headline: 免費的東西不會跟你要卡號
  explanation: 領折價券是店家送你優惠，不需要你的信用卡資料。看到「免費」和「要卡號」同時出現，就可以判斷這是假的。真的想確認有沒有生日優惠，請家人打開原本的購物 App 看。
  safeActions:
    - 不在陌生折價頁輸入信用卡資料。
    - 請家人一起從官方商店查詢優惠。
