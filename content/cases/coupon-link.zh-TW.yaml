channel: sms
classification: insufficient-evidence
provenance:
  kind: classic-pattern
  note: 改寫以折價券或免運優惠引導輸入付款資料的常見手法。
sources: []
learning:
  stages: [3-4]
  dimensions: [prevention, response]
  topic: 網路購物
  readingLevel: easy
  difficulty: introductory
  contexts: [網路商店, 折價券, 簡訊]
