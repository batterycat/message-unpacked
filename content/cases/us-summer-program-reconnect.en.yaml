title: Someone From Summer Program Messages You
channel: chat
classification: trustworthy
provenance:
  kind: fictional
  note: Teaching scenario written as the positive counterpart to impersonation cases, where shared private history and an absent request make the message safe.
sources: []
learning:
  stages: [10-12]
  dimensions: [prevention]
  topicId: social-relationships
  topic: Social & Friendships
  readingLevel: standard
  difficulty: introductory
  contexts: [online friendships, direct messages, shared activities]
