title: 班級團購的收款訊息
channel: chat
classification: insufficient-evidence
provenance:
  kind: classic-pattern
  note: 綜整班級或社團群組中，冒用發起人身分收取團購款項的常見情境。
sources: []
learning:
  stages: [7-9]
  dimensions: [prevention, response, ethics]
  topic: 網路購物
  readingLevel: standard
  difficulty: intermediate
  contexts: [班級群組, 團購, 同儕金錢往來]
  skills: [跨管道確認身分, 核對金額與帳號, 避免公開指控]
  riskTypes: [冒名收款, 熟人冒用]
  sensitiveContent: [金錢損失]
