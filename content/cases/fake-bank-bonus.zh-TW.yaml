  kind: classic-pattern
  note: 改寫冒用銀行紅利或加碼活動、要求登入投資頁面的簡訊手法。
sources: []
learning:
  stages: [7-9]
  dimensions: [prevention, response, post-incident]
  topicId: investment-advertising
