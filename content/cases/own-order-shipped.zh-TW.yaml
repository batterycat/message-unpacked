title: 自己下單的出貨通知
channel: sms
classification: trustworthy
provenance:
  kind: fictional
  note: 為練習辨認正常物流通知而建立的教學虛構情境，作為假物流與幽靈包裹案例的正面對照。
sources: []
learning:
  stages: [7-9]
  dimensions: [prevention]
