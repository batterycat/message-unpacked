translationGroupId: family-shopping-order
locale: zh-TW
status: published
title: 家長買的生日禮物包裹
channel: sms
classification: trustworthy
provenance:
  kind: fictional
  note: 為低年級練習從家長與既有訂單確認正常物流通知而設計。
sources: []
learning:
  stages: [1-2]
  dimensions: [prevention, response]
  topic: 網路購物
  readingLevel: easy
  difficulty: introductory
  contexts: [家庭, 包裹, 生日禮物]
  skills: [向家長確認, 辨認正常通知]
  riskTypes: [誤判正常物流]
  sensitiveContent: []
  trustedAdultRecommended: true
messages:
  - id: message.order
    sender: 家長
    body: 我在平常的購物 App 買了你的生日禮物，物流到貨時我會自己收。
    timestamp: '18:00'
    direction: incoming
clues:
  - id: clue.family
    label: 由家長說明購物內容
    explanation: 你可以直接向家長確認，而不是自己處理付款或物流資料。
  - id: clue.no-link
    label: 沒有陌生連結或付款要求
    explanation: 這則訊息沒有附連結，也沒有要你付錢或填資料，而且收包裹的事家長說會自己處理。
choices:
  - id: choice.trustworthy
    label: 先跟家長確認，再照平常方式等包裹
    classification: trustworthy
    reasoning: 訊息是家長傳的，也沒有要你付錢或填資料。
    score: 100
  - id: choice.fraud
    label: 包裹訊息都是詐騙，叫家長取消訂單
    classification: fraud
    reasoning: 網購本身不是詐騙證據。用「是不是包裹訊息」來判斷，以後會把家長真正的通知也全部擋掉。
    score: 20
  - id: choice.verify
    label: 自己點連結查包裹，順便輸入姓名
    classification: insufficient-evidence
    reasoning: 不需要額外輸入個資，應直接向家長確認。
    score: 15
recommendedActionIds: [anti-fraud.online-report, anti-fraud.consult]
debrief:
  headline: 家長知道的訂單可以直接確認
  explanation: 防詐不是把所有包裹都當成假的，而是看清楚訊息是誰傳的、要你做什麼。這則沒有要你付錢，也沒有要你填資料。
  safeActions:
    - 直接詢問家長訂單與收件安排。
    - 不點不明連結、不提供個資。
review:
