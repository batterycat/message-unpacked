debrief:
  headline: 家人知道的訂單可以直接確認
  explanation: 防詐不是拒絕所有包裹，而是確認來源和安全做法。這則訊息沒有要求你自行付款或交資料。
  safeActions:
    - 直接詢問家人訂單與收件安排。
    - 不點不明連結、不提供個資。
