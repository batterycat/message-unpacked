clues:
  - id: clue.unrelated-service
    label: 驗證碼來自非遊戲服務
    explanation: 服務名稱對不上，代表對方可能正在用你的門號開通其他帳號或功能。
  - id: clue.otp-request
    label: 要求截圖或轉傳 OTP
    explanation: OTP 是一次性的身分驗證秘密，客服不需要你把它交給別人。
  - id: clue.free-reward
    label: 免費獎勵搭配倒數
    explanation: 高價值獎勵與短期限會讓人忽略驗證碼實際授權了什麼。
choices:
  - id: choice.trustworthy
    label: 只是領獎流程，可以把驗證碼傳過去
    classification: trustworthy
    reasoning: 驗證碼來自無關服務，交付後可能授權陌生裝置或帳號。
    score: 0
  - id: choice.fraud
    label: 這是詐騙，停止對話且不提供任何驗證碼
    classification: fraud
    reasoning: 你抓到免費獎勵、服務名稱不符與索取 OTP 的組合風險。
    score: 100
  - id: choice.verify
    label: 先把驗證碼留著，再問對方這是哪個活動
    classification: insufficient-evidence
    reasoning: 不交付驗證碼是對的，但不應繼續沿用對方提供的管道查證。
    score: 65
recommendedActionIds: [anti-fraud.consult, anti-fraud.online-report]
debrief:
  headline: 驗證碼是在授權，不是領獎序號
  explanation: 對方刻意淡化驗證碼上的服務名稱，讓學生以為只是遊戲流程。只要用途與你正在做的事不一致，就應停止並找可信任的大人協助檢查門號與帳號。
  safeActions:
    - 不提供手機號碼、密碼、OTP 或驗證碼截圖。
    - 若已交付，立即告知家長並聯繫電信業者檢查門號附加服務。
    - 保存對話與帳號資料，透過官方管道通報可疑帳號。
