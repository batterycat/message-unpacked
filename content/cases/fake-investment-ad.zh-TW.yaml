messages:
  - id: message.invitation
    sender: 理財研究社管理員
    body: 你是學生也能從小額開始。名人老師親自帶單，群友本週全部獲利，保證不會賠；先加入私人群組並下載專用投資程式。
    timestamp: '19:05'
    direction: incoming
  - id: message.proof
    sender: 理財研究社管理員
    body: 群裡已經有三百多人跟單，大家都貼出金紀錄，今天入金還送體驗金。
    timestamp: '19:07'
    direction: incoming
clues:
  - id: clue.guarantee
    label: 宣稱保證獲利
    explanation: 合法投資存在風險，任何穩賺不賠或保證收益的承諾都應高度警覺。
  - id: clue.private-app
    label: 要求下載專用程式並私下入金
    explanation: 離開合法金融機構與官方商店，會讓資金與帳號缺乏正常保護。
  - id: clue.social-proof
    label: 用大量群友見證催促
    explanation: 群組帳號、獲利截圖與對話可能由同一批人製造，不能當成獨立證據。
choices:
  - id: choice.trustworthy
    label: 很多人都獲利，可以先用少量零用錢試試
    classification: trustworthy
    reasoning: 小額也可能被持續誘導加碼，群友與截圖不能證明投資平臺真實。
    score: 0
  - id: choice.fraud
    label: 這是假投資高風險訊息，不加入群組也不下載程式
    classification: fraud
    reasoning: 你辨識出保證獲利、名人冒用、私下入金與群組造勢的完整詐騙鏈。
    score: 100
  - id: choice.verify
    label: 先加入群組觀察，只要不匯款就沒風險
    classification: insufficient-evidence
    reasoning: 暫不匯款較安全，但加入群組仍會暴露帳號並持續承受操弄與誘導。
    score: 50
recommendedActionIds: [tw.anti-fraud.165-call, tw.online-fraud-report]
debrief:
  headline: 群組很熱鬧，也可能只是一場布置
  explanation: 詐騙者不只偽造一則廣告，還會安排群友、獲利截圖與客服共同演出。看到保證獲利、下載陌生程式或私下交付資金時，應直接停止。
  safeActions:
    - 不加入來路不明的投資群組、不下載指定程式。
    - 不因名人照片、影片或群友見證就相信投資邀請。
    - 把可疑廣告交給可信任的大人，並透過官方管道查詢或通報。
