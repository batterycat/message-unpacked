title: A Charge You Don't Recognize, From Someone You Do
channel: chat
classification: trustworthy
provenance:
  kind: fictional
  note: Teaching scenario written as the positive counterpart to bank impersonation cases, where the unfamiliar charge has an ordinary household explanation.
sources: []
learning:
  stages: [10-12]
  dimensions: [prevention]
  topicId: family-life
  topic: Family & Everyday Life
  readingLevel: standard
  difficulty: introductory
  contexts: [family finances, shared accounts, text messages]
