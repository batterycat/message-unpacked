title: The Mod Says You're About to Be Banned
channel: chat
classification: fraud
provenance:
  kind: classic-pattern
  note: Rewrites the impersonated-moderator scheme that uses a ban threat and a short deadline to extract a login code.
sources: []
learning:
  stages: [10-12]
  dimensions: [prevention, response]
  topicId: gaming-accounts
  topic: Gaming & Accounts
  readingLevel: standard
  difficulty: introductory
  contexts: [chat servers, gaming communities, account security]
  skills:
    [
