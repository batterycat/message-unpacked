channel: email
classification: fraud
provenance:
  kind: classic-pattern
  note: 改寫假冒稅務機關，以退費為名索取網銀與信用卡資料的手法。
sources: []
learning:
  stages: [10-12]
  dimensions: [prevention, response, law]
  topic: 家庭與生活
  readingLevel: advanced
  difficulty: intermediate
  contexts: [稅務, 家庭財務, Email]
