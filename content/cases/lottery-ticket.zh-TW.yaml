messages:
  - id: message.lottery
    sender: 國際彩券投資顧問
    body: 恭喜你家抽中 50,000 元投資回饋，只要先購買 2,000 元點數卡支付稅金就能領取。
    timestamp: '17:36'
    direction: incoming
clues:
  - id: clue.no-entry
    label: 沒有參加卻收到中獎通知
    explanation: 你根本沒有參加抽獎，不可能中獎。收到這種訊息，告訴家人就好。
  - id: clue.payment
    label: 領獎前要求點數卡
    explanation: 正常獎項不會用點數卡支付稅金或保證金。
choices:
  - id: choice.trustworthy
    label: 幫家人買點數卡，這是難得的中獎
    classification: trustworthy
    reasoning: 未參加活動又要求先付款，是典型假中獎訊號。
    score: 0
  - id: choice.fraud
    label: 不付款，拿給家人或老師一起看
    classification: fraud
    reasoning: 你辨識出未參加卻中獎與點數卡付款的風險。
    score: 100
  - id: choice.verify
    label: 先回信問要不要改用現金付款
    classification: insufficient-evidence
    reasoning: 不應繼續和可疑寄件者往來，應停止並請大人協助。
    score: 40
recommendedActionIds: [anti-fraud.online-report, anti-fraud.consult]
debrief:
  headline: 沒參加就中獎，先停下來找大人
  explanation: 假中獎會用大獎讓人忽略先付款的風險。孩子遇到金錢要求，不需要自己回覆或處理。
  safeActions:
    - 不購買點數卡、不回傳卡號。
    - 把信件拿給家人、老師或可信任的大人。
