messages:
  - id: message.group
    sender: 四年級家長會通知
    body: 老師請大家加入新的作業群組，點 https://classroom.example.com 填寫學生姓名和家長手機，今天晚上前完成。
    timestamp: '18:04'
    direction: incoming
clues:
  - id: clue.unknown
    label: 寄件者不是平常的班級管道
    explanation: 看起來像家長會不代表就是學校建立的群組，要先問家人或老師。
  - id: clue.personal-data
    label: 要求填寫姓名與手機
    explanation: 尚未確認來源前，不要把學生或家長資料填進陌生表單。
choices:
  - id: choice.trustworthy
    label: 先填資料，免得錯過作業
    classification: trustworthy
    reasoning: 這樣會在來源未確認前交出個資，不能因為有期限就跳過查證。
    score: 0
  - id: choice.fraud
    label: 一定是詐騙，不理這則訊息
    classification: fraud
    reasoning: 不填資料是對的。但新的作業群組可能真的存在，請家人問老師一句就能確認，才不會漏掉作業。
    score: 60
  - id: choice.verify
    label: 不填資料，請家人從老師原本的管道確認
    classification: insufficient-evidence
    reasoning: 在確認群組真實性前先停下來，並請家人或老師用既有管道核對。
    score: 100
recommendedActionIds: [anti-fraud.online-report, anti-fraud.consult]
debrief:
  headline: 先確認群組，再處理作業通知
  explanation: 冒用學校身分的訊息常用作業或期限催促。來源不明時，保護個資並請大人從已知的老師或學校管道確認。
  safeActions:
    - 不在陌生表單填寫學生與家長資料。
    - 請家人或老師從原本的班級管道確認。
