title: 家長群組的作業通知
channel: chat
classification: insufficient-evidence
provenance:
  kind: classic-pattern
  note: 綜整冒用老師或家長群組身分、要求加入陌生群組的常見手法。
sources: []
learning:
  stages: [3-4]
  dimensions: [prevention, response]
  topic: 校園與學習
  readingLevel: easy
  difficulty: introductory
  contexts: [班級群組, 作業, 家庭]
  skills: [核對寄件者, 找可信任的大人]
