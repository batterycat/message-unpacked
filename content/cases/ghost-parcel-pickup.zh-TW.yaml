    body: 您的包裹已送達指定門市，貨到付款 1,180 元，請於本週日前完成取件。
    timestamp: '15:34'
    direction: incoming
clues:
  - id: clue.no-order
    label: 自己不記得下單
    explanation: 包裹可能是家人代訂，也可能是未經同意寄送；不能只靠通知判斷。
  - id: clue.cod
    label: 取件時才付款
    explanation: 貨到付款不代表包裹一定可信，付款前仍要核對訂單、金額與寄件資訊。
choices:
  - id: choice.trustworthy
    label: 包裹已到超商，應該是家人買的，直接付款
    classification: trustworthy
    reasoning: 超商通知只能證明有包裹，不能證明自己或家人真的下過訂單。
    score: 15
  - id: choice.fraud
    label: 一定是詐騙，不去領也不查了
    classification: fraud
    reasoning: 不付款取件是對的。但包裹也可能真的是家人代訂的，放著不查會被退回；查訂單、問家人都不用花錢。
    score: 60
  - id: choice.verify
    label: 先核對訂單並問家人，無法確認就不付款取件
    classification: insufficient-evidence
    reasoning: 你保留兩種可能，並用不先付款的方式完成獨立查證。
    score: 100
debrief:
  headline: 有包裹不代表有訂單
  explanation: 收到真實的超商通知，也可能是詐騙者寄出的未訂購包裹。先查自己的訂單、詢問家人並核對寄件資訊，無法確認時就拒絕付款取件。
  safeActions:
    - 付款前核對購物紀錄、金額與寄件者。
    - 未訂購或無法確認的包裹直接拒收。
    - 若已付款，保留完整外箱、繳費憑證與包裹單據，儘快聯繫超商申訴。
