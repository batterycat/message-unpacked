id: password-reset-alert.zh-tw
schemaVersion: 1
contentVersion: 1.1.0
translationGroupId: password-reset-alert
locale: zh-TW
status: published
title: 不是你要求的密碼重設
channel: email
classification: insufficient-evidence
provenance:
  kind: fictional
  note: 為練習處理可能真實、也可能偽造的帳號安全通知而建立的教學虛構情境。
sources: []
learning:
  stages: [7-9, 10-12]
  dimensions: [prevention, response]
  topicId: gaming-accounts
  topic: 遊戲與帳號
  readingLevel: standard
  difficulty: intermediate
  contexts: [帳號安全, 電子郵件, 社群平台]
  skills: [從官方 App 查登入紀錄, 不沿用郵件連結, 啟用多重要素驗證]
  riskTypes: [帳號嘗試存取, 寄件者偽造]
  sensitiveContent: []
  trustedAdultRecommended: false
messages:
  - id: message.reset
    sender: 帳號安全通知（security@accounts.example.com）
    body: 我們收到您的密碼重設要求。如果不是您本人操作，請自行開啟平常使用的官方 App 檢查登入紀錄。
    timestamp: 週五 09:12
    direction: incoming
clues:
  - id: clue.no-link
    label: 沒有要求從郵件登入
    explanation: 整封信沒有附登入或取消連結，也沒有索取驗證碼，而是要你自己打開既有 App，降低被帶往仿冒頁面的風險。能當線索的是這封信實際上沒有這些要求，不是它宣稱自己不會這麼做。
  - id: clue.unrequested
    label: 自己沒有要求重設密碼
    explanation: 可能有人輸錯帳號、嘗試存取，也可能通知本身被偽造，需要從帳號內確認。
choices:
  - id: choice.trustworthy
    label: 寄件網域看起來正常，所以帳號一定遭入侵
    classification: trustworthy
    reasoning: 你沒有做出危險動作，但結論下太快了：寄件網域可以偽造，而且就算信是真的，也只代表「有人嘗試重設」，不代表帳號已經被入侵。
    score: 60
  - id: choice.fraud
    label: 不是我操作就一定是假信，直接忽略
    classification: fraud
    reasoning: 這封信也可能是真的警告。如果真的有人正在嘗試登入你的帳號，忽略它就錯過了處理時機——這裡不查證的代價比誤信還高。
    score: 40
  - id: choice.verify
    label: 先不下結論，直接開官方 App 檢查登入與安全設定
    classification: insufficient-evidence
    reasoning: 你沒有沿用郵件入口，也能確認是否真的有重設或異常登入紀錄。
    score: 100
debrief:
  headline: 安全通知的真假，要回到帳號本身確認
  explanation: 這封信沒有高風險要求，可能是真通知；寄件資訊也可能被偽造。從官方 App 查看安全紀錄，能同時處理兩種可能。
  safeActions:
    - 自行開啟官方 App，不點郵件中的登入或取消連結。
    - 檢查近期登入、密碼重設紀錄與已登入裝置。
    - 發現異常時更改密碼並啟用多重要素驗證。
review:
  lastReviewedAt: 2026-07-20
  maintenanceStatus: active
