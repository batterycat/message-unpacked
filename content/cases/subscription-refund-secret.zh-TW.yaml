locale: zh-TW
status: published
title: 家庭影音方案被誤升級
channel: email
classification: fraud
provenance:
  kind: classic-pattern
  note: 綜整假客服以誤設年繳、重複扣款或升級會員為由，索取金融資料與 OTP 的常見手法。
sources: []
learning:
  stages: [7-9]
  dimensions: [prevention, response]
  topic: 家庭與生活
  readingLevel: standard
  difficulty: introductory
  contexts: [影音服務, 家庭, 電子郵件]
  skills: [辨識退款話術, 保護家人金融資料, 從帳號內查訂閱]
  riskTypes: [假客服, 金融資料竊取, 驗證碼竊取]
  sensitiveContent: []
  trustedAdultRecommended: true
messages:
  - id: message.upgrade
    sender: 影音服務退款部門
    body: 系統誤將您的家庭方案升級為年繳，今晚將扣款 8,990 元。請回覆家長金融卡正面照片，客服稍後會索取簡訊驗證碼以取消扣款。
    timestamp: 週四 17:40
    direction: incoming
clues:
  - id: clue.refund-secret
    label: 退款卻要求卡片與 OTP
    explanation: 退款或取消訂閱不需要把完整卡片資料與一次性驗證碼交給客服。
  - id: clue.family-pressure
    label: 用家人即將被扣款製造焦慮
    explanation: 擔心造成家人損失時，更容易跳過帳號內的訂閱紀錄與官方客服。
choices:
  - id: choice.trustworthy
    label: 為了避免扣款，先找家長拿卡片資料
    classification: trustworthy
    reasoning: 這會把家人的金融資料與驗證碼交給無法確認的寄件者。
    score: 0
  - id: choice.fraud
    label: 這是假退款詐騙，不回信並請家長從官方 App 查訂閱
    classification: fraud
    reasoning: 你避開索取金融秘密的流程，也把可能的真訂閱問題交回可信入口處理。
    score: 100
  - id: choice.verify
    label: 先回信問清楚扣款日期，不提供驗證碼
    classification: insufficient-evidence
    reasoning: 不提供驗證碼是對的，但回信仍無法驗證寄件者，應直接換到官方管道。
    score: 40
recommendedActionIds: [anti-fraud.online-report, anti-fraud.consult]
debrief:
  headline: 退款不需要把金融秘密交給客服
  explanation: 誤升級、重複扣款與今晚扣款是常見壓力話術。即使真的有訂閱問題，也應由帳號內的訂閱頁或自行找到的官方客服處理。
  safeActions:
    - 不回傳卡片照片、帳戶密碼或 OTP。
    - 告知家長，從官方 App 或信用卡帳單核對是否有訂閱。
    - 若已交付資料，立即聯繫發卡銀行並變更相關帳號密碼。
review:
