messages:
  - id: message.card
    sender: 遊戲好友
    body: 我送你免費寶石！拍下家裡點數卡的刮刮碼傳給我，我幫你換成遊戲幣，不能讓別人知道。
    timestamp: '放學後'
    direction: incoming
clues:
  - id: clue.code
    label: 要求拍下點數卡密碼
    explanation: 儲值卡序號就像現金，不能拍照或傳給聊天對象。
  - id: clue.secret
    label: 要求對大人保密
    explanation: 讓你不能找家長確認，是需要立刻停下來求助的訊號。
choices:
  - id: choice.trustworthy
    label: 拍給他，這樣就能拿到免費遊戲幣
    classification: trustworthy
    reasoning: 點數卡序號可以被直接使用，不能因為是朋友就交出去。
    score: 0
  - id: choice.fraud
    label: 不傳序號，立刻拿給家長或老師看
    classification: fraud
    reasoning: 你辨識出索取儲值碼與要求保密的危險線索。
    score: 100
  - id: choice.verify
    label: 先只傳點數卡正面，不傳刮刮碼
    classification: insufficient-evidence
    reasoning: 不要再跟他傳卡片的照片了。停下來，請大人幫忙。
    score: 15
recommendedActionIds: [anti-fraud.online-report, anti-fraud.consult]
debrief:
  headline: 點數卡序號就是秘密
  explanation: 不論對方說是好友、客服或贈品活動，都不要交出點數卡刮刮碼。遇到要求保密時，找可信任的大人一起看。
  safeActions:
    - 不拍攝或傳送儲值卡序號。
    - 保留訊息並告訴家長、老師或其他可信任的大人。
