  kind: classic-pattern
  note: 改寫以免費點數為名要求拍攝或轉交儲值卡序號的常見手法。
sources: []
learning:
  stages: [1-2]
  dimensions: [prevention, response]
  topic: 遊戲與帳號
  readingLevel: easy
  difficulty: introductory
  contexts: [線上遊戲, 點數卡, 同儕互動]
