messages:
  - id: message.bottle
    sender: 二年一班老師
    body: 明天要到戶外觀察植物，請帶水壺和帽子。
    timestamp: '今天 17:00'
    direction: incoming
clues:
  - id: clue.context
    label: 內容和班級活動有關
    explanation: 訊息說的是你已經知道的課堂活動，聯絡簿上也抄了一樣的事情，可以自己對照看看。
  - id: clue.no-secret
    label: 沒有索取秘密資料
    explanation: 這則訊息沒有要密碼、沒有要錢，也沒有陌生連結。要看它「實際上有沒有要」，不是看它「說自己不會要」。
choices:
  - id: choice.trustworthy
    label: 先跟家長確認，再準備需要的用品
    classification: trustworthy
    reasoning: 這是符合課堂情境的提醒，也可以透過家長或老師確認內容。
    score: 100
  - id: choice.fraud
    label: 只要是簡訊就一定是詐騙
    classification: fraud
    reasoning: 防詐不是把所有訊息都當成假的，仍要看內容與查證方式。
    score: 20
  - id: choice.verify
    label: 完全不理會，也不需要告訴大人
    classification: insufficient-evidence
    reasoning: 保持小心很好，但正常的班級提醒可以透過老師或家長安全確認。
    score: 60
debrief:
  headline: 正常提醒也可以安全確認
  explanation: 看訊息的時候，不是看它是不是簡訊就好。要想三件事：這件事我本來就知道嗎？它有沒有跟我要秘密？我可以用平常的方法問到答案嗎？
  safeActions:
    - 從平常知道的方式向老師或家長確認。
    - 不因為訊息看起來正常，就提供密碼或個人資料。
