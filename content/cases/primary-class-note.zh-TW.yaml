clues:
  - id: clue.context
    label: 內容和班級活動有關
    explanation: 訊息提到你已知道的課堂活動，內容可以向老師或家人再次確認。
  - id: clue.no-secret
    label: 沒有索取秘密資料
    explanation: 沒有要求密碼、驗證碼、付款或點擊陌生連結，是較安全的特徵。
choices:
  - id: choice.trustworthy
    label: 先跟家人確認，再準備需要的用品
    classification: trustworthy
    reasoning: 這是符合課堂情境的提醒，也可以透過家人或老師確認內容。
    score: 100
  - id: choice.fraud
    label: 只要是簡訊就一定是詐騙
    classification: fraud
    reasoning: 防詐不是把所有訊息都當成假的，仍要看內容與查證方式。
    score: 20
  - id: choice.verify
    label: 完全不理會，也不需要告訴大人
    classification: insufficient-evidence
    reasoning: 保持小心很好，但正常的班級提醒可以透過老師或家人安全確認。
    score: 60
recommendedActionIds: []
debrief:
  headline: 正常提醒也可以安全確認
  explanation: 判斷訊息時，不只看它是不是簡訊，也要看是否符合你知道的情境、是否索取秘密，以及能不能用既有管道確認。
  safeActions:
    - 從平常知道的方式向老師或家人確認。
    - 不因為訊息看起來正常，就提供密碼或個人資料。
