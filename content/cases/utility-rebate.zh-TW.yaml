messages:
  - id: message.rebate
    sender: 電費回饋服務
    body: 你有 1,200 元節能回饋待領，請至 https://energy-rebate.example.com 登入網銀完成身分驗證，逾期失效。
    timestamp: '20:51'
    direction: incoming
clues:
  - id: clue.rebate
    label: 回饋金要求登入網銀
    explanation: 回饋應能從帳單或官方帳戶查到，不會要求在陌生頁面登入網銀。
  - id: clue.expiry
    label: 以逾期失效催促
    explanation: 損失感與期限會讓人忽略確認官方來源。
choices:
  - id: choice.trustworthy
    label: 趕快登入領回饋，避免權益消失
    classification: trustworthy
    reasoning: 網銀登入要求與陌生連結都是重大風險，不能因回饋金而忽略。
    score: 0
  - id: choice.fraud
    label: 不點連結，從帳單或官方服務查詢回饋
    classification: fraud
    reasoning: 你辨識出假回饋常用的陌生入口、網銀要求與期限話術。
    score: 100
  - id: choice.verify
    label: 只輸入網銀帳號，不輸入密碼
    classification: insufficient-evidence
    reasoning: 任何網銀資料都不應輸入陌生頁面，應改走官方入口。
    score: 15
debrief:
  headline: 回饋要對照帳單與官方帳戶
  explanation: 假回饋會利用「不領就損失」的感覺。請從紙本帳單、官方 App 或已知客服確認，不使用郵件連結。
  safeActions:
    - 不輸入網銀密碼、卡號或驗證碼。
    - 若已輸入資料，立即通知家人與金融機構處理。
