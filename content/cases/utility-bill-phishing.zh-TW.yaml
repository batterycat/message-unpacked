messages:
  - id: message.overdue
    sender: 公用事業帳務中心
    body: 您本期電費尚未繳納，今晚 22:00 將停止供電。請立即至 https://power-bill.example.com 補繳 680 元並完成信用卡驗證。
    timestamp: '17:26'
    direction: incoming
clues:
  - id: clue.shutdown
    label: 以今晚停用製造壓力
    explanation: 短期限讓人來不及核對帳單、寄件者與正常催繳流程。
  - id: clue.payment-link
    label: 要求從簡訊連結輸入付款資料
    explanation: 安全做法是自行開啟既有官方 App、紙本帳單或手動輸入已知網址。
  - id: clue.generic-sender
    label: 寄件者名稱模糊
    explanation: 只寫帳務中心，沒有可獨立核對的戶號或正式聯絡資訊。
choices:
  - id: choice.trustworthy
    label: 停電會影響家人，先用信用卡補繳
    classification: trustworthy
    reasoning: 正因影響重大，更應從既有帳單或官方入口確認，不能沿用簡訊連結。
    score: 0
  - id: choice.fraud
    label: 高度疑似釣魚簡訊，不點連結並請家人查帳單
    classification: fraud
    reasoning: 你同時避開可疑付款頁，並用家庭帳單或官方入口確認是否真的欠費。
    score: 100
  - id: choice.verify
    label: 先點開看看網址像不像真的，但不輸入資料
    classification: insufficient-evidence
    reasoning: 不輸入資料較安全，但開啟可疑連結本身沒有必要，也可能帶來額外風險。
    score: 40
debrief:
  headline: 越怕服務中斷，越要離開簡訊查證
  explanation: 詐騙者利用電費、監理、電信或銀行等重要服務製造焦慮。真正安全的處理方式，是從家中既有帳單、官方 App 或自行找到的客服管道確認。
  safeActions:
    - 不點簡訊內的催繳或信用卡驗證連結。
    - 請家人從紙本帳單、官方 App 或已知客服查證。
    - 若已輸入信用卡或 OTP，立即告知家長並聯繫發卡銀行處理。
