impact:
  eventSummary: 刑事警察局偵破一個假冒公用事業、監理機關、電信與銀行發送釣魚簡訊的集團；被害人輸入信用卡資料與 OTP 後遭盜刷。
  period: 2025年5月至8月
  location: 臺東縣、彰化縣等地
  victimCount:
    count: 31
    qualifier: reported
    sourceIds: [source.cib.sms-phishing]
  nonFinancialImpact: 被害人的信用卡資料與一次性驗證碼遭取得並用於未授權交易。
  sourceIds: [source.cib.sms-phishing]
learning:
  stages: [7-9, 10-12]
