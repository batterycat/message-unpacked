title: 親戚手機壞掉的求助
channel: sms
classification: fraud
provenance:
  kind: classic-pattern
  note: 綜整冒充親友、以手機遺失或急難為名要求轉帳的常見手法。
sources: []
learning:
  stages: [1-2]
  dimensions: [prevention, response]
  topicId: family-life
  topic: 家庭與生活
  readingLevel: easy
  difficulty: introductory
  contexts: [家庭, 親友, 緊急求助]
  skills: [找可信任的大人, 跨管道確認身分]
  riskTypes: [親友冒用, 緊急匯款]
  sensitiveContent: [金錢損失, 要求對大人保密]
  trustedAdultRecommended: true
messages:
  - id: message.relative
    sender: 未知號碼（自稱舅舅）
    body: 我的手機壞了，現在要付修理費，請你拿家長的手機幫我買 3,000 元點數卡，把卡號拍給我，不能先告訴媽媽。
    timestamp: '放學後'
    direction: incoming
clues:
  - id: clue.secret
    label: 要求瞞著家長
    explanation: 叫你不能告訴家長，就是要讓你沒辦法確認。這是需要立刻停下來求助的訊號。
  - id: clue.card
    label: 要求購買並傳送點數卡
    explanation: 點數卡序號等於現金，拍照傳出去就拿不回來了，不能因為對方說自己是舅舅就交出去。
choices:
  - id: choice.trustworthy
    label: 先買點數卡，舅舅真的很急
    classification: trustworthy
    reasoning: 這樣錢就拿不回來了。真正的舅舅不會叫你瞞著媽媽買點數卡。
    score: 0
  - id: choice.fraud
    label: 這是詐騙訊息，不買點數卡，馬上把手機拿給家長看
    classification: fraud
    reasoning: 你看出「要點數卡」加上「不能告訴家長」就是詐騙，也把事情交給大人處理。
    score: 100
  - id: choice.verify
    label: 先傳一張點數卡的照片給他，看看他怎麼說
    classification: insufficient-evidence
    reasoning: 不可以傳。只要拍到序號，錢就可能被用掉；也不需要再跟對方多聊。
    score: 15
debrief:
  headline: 又要點數卡、又要保密，就是詐騙
  explanation: 這則訊息不是舅舅傳的，是別人用舅舅的名字騙你。真正的舅舅不會叫你瞞著媽媽買點數卡。看到「要錢」加上「不能告訴大人」，就可以確定是詐騙，把手機拿給家長或老師看。
  safeActions:
    - 不購買、不拍攝、不傳送點數卡序號。
    - 把訊息拿給家長或老師看，讓大人用已知的電話確認舅舅平安。
