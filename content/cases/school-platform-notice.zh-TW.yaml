id: school-platform-notice.zh-tw
schemaVersion: 1
contentVersion: 1.0.0
translationGroupId: school-platform-notice
locale: zh-TW
status: published
title: 學校平台的作業提醒
channel: email
classification: trustworthy
provenance:
  kind: fictional
  note: 為避免使用真實學校資料而建立的教學虛構情境。
sources: []
learning:
  stages: [7-9]
  dimensions: [prevention]
  topic: 校園與學習
  readingLevel: easy
  difficulty: introductory
  contexts: [校園, 電子郵件]
  skills: [核對寄件網域, 從既有入口查證]
  riskTypes: [誤判正常通知]
  sensitiveContent: []
  trustedAdultRecommended: false
messages:
  - id: message.assignment
    sender: 校務學習平台（notice@school.example.org）
    body: 七年二班自然科作業已更新。請從你平常使用的校務平台登入查看，本信不會要求你回覆密碼。
    timestamp: 週二 16:10
    direction: incoming
clues:
  - id: clue.no-direct-link
    label: 沒有要求從信中登入
    explanation: 訊息引導你使用原本就知道的校務平台入口，降低被帶往仿冒網站的風險。
  - id: clue.no-secret
    label: 明確不索取密碼
    explanation: 正常通知不應要求以回信、表單或聊天傳送密碼與驗證碼。
choices:
  - id: choice.trustworthy
    label: 具備可信特徵，仍從既有入口查看
    classification: trustworthy
    reasoning: 你沒有只憑寄件名稱相信，而是選擇從平常使用的入口核對通知。
    score: 100
  - id: choice.fraud
    label: 只要是通知信都是詐騙
    classification: fraud
    reasoning: 把所有訊息都視為詐騙會妨礙正常溝通；應根據可查證線索判斷。
    score: 20
  - id: choice.verify
    label: 完全無法判斷，也不需要查看
    classification: insufficient-evidence
    reasoning: 保持警覺很好，但這封信提供了安全的獨立查證方式，也沒有要求交付秘密資訊。
    score: 60
recommendedActionIds: []
debrief:
  headline: 防詐不是把所有訊息都當成假的
  explanation: 可信訊息也要用安全方式確認。這封信沒有內嵌登入連結或索取秘密資訊，並請你使用原本的校務平台入口。
  safeActions:
    - 從既有書籤或學校首頁進入平台。
    - 對寄件網域有疑問時，向老師或學校資訊窗口確認。
review:
  lastReviewedAt: 2026-07-18
  maintenanceStatus: active
