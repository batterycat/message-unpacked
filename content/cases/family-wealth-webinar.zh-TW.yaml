messages:
  - id: message.webinar
    sender: 家庭財富學院
    body: 免費線上講座只剩最後十席，參加者可保證年報酬 18%，請先匯 2,000 元取得專屬投資名額。
    timestamp: '19:35'
    direction: incoming
clues:
  - id: clue.guarantee
    label: 保證年報酬 18%
    explanation: 合法投資也有風險，固定報酬承諾不能當作可信證據。
  - id: clue.deposit
    label: 免費講座卻要求先匯款
    explanation: 入金名額與講座資格不合理地綁在一起，應先查主辦方與服務內容。
choices:
  - id: choice.trustworthy
    label: 先匯款搶到名額，保證收益很吸引人
    classification: trustworthy
    reasoning: 限量、保證收益與先付款是需要停止查證的組合。
    score: 0
  - id: choice.fraud
    label: 保證收益加上先匯款就是詐騙，不參加也不付款
    classification: fraud
    reasoning: 沒有任何合法投資能保證年報酬，再加上要先匯款取得名額，已足以判定。
    score: 100
  - id: choice.verify
    label: 先報名講座聽聽看，只要不匯款就沒差
    classification: insufficient-evidence
    reasoning: 不匯款較安全，但報名會留下聯絡方式，講座本身就是持續說服你入金的場合。
    score: 40
debrief:
  headline: 理財講座不會保證收益
  explanation: 「保證年報酬 18%」在合法投資裡不可能存在，再加上要先匯 2,000 元才有名額，這兩點合起來就足以判定為詐騙，不需要再去查主辦方是誰。免費講座與最後名額只是用來加快你的決定。
  safeActions:
    - 不私下匯款或提供金融資料。
    - 保留廣告與信件，必要時向 165 諮詢。
    - 把內容拿給家人一起看，避免家中其他成員也收到同一封信而受騙。
