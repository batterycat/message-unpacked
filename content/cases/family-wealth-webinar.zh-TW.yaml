messages:
  - id: message.webinar
    sender: 家庭財富學院
    body: 免費線上講座只剩最後十席，參加者可保證年報酬 18%，請先匯 2,000 元取得專屬投資名額。
    timestamp: '19:35'
    direction: incoming
clues:
  - id: clue.guarantee
    label: 保證年報酬 18%
    explanation: 合法投資也有風險，固定報酬承諾不能當作可信證據。
  - id: clue.deposit
    label: 免費講座卻要求先匯款
    explanation: 入金名額與講座資格不合理地綁在一起，應先查主辦方與服務內容。
choices:
  - id: choice.trustworthy
    label: 先匯款搶到名額，保證收益很吸引人
    classification: trustworthy
    reasoning: 限量、保證收益與先付款是需要停止查證的組合。
    score: 0
  - id: choice.fraud
    label: 直接轉寄給親友，提醒他們是詐騙
    classification: fraud
    reasoning: 內容高度可疑，但應先保留證據與查證，不要散播未確認指控。
    score: 50
  - id: choice.verify
    label: 不匯款，先查主辦方、投資資格與正式公開資料
    classification: insufficient-evidence
    reasoning: 先保留金錢與判斷空間，用獨立資料核對講座與投資方案。
    score: 100
recommendedActionIds: []
debrief:
  headline: 理財講座不會保證收益
  explanation: 免費講座、最後名額與高報酬會讓人急著付款。把內容拿給家人一起看，先查主辦方與合法資格。
  safeActions:
    - 不私下匯款或提供金融資料。
    - 保留廣告與信件，必要時向 165 諮詢。
