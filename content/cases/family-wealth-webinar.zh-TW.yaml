title: 家庭理財講座的保證名額
channel: email
classification: fraud
provenance:
  kind: classic-pattern
  note: 綜整免費理財講座以保證收益、限時入金吸引家庭成員的手法。
sources: []
learning:
  stages: [10-12]
  dimensions: [prevention, response, ethics]
  topicId: investment-advertising
  topic: 投資與廣告
  readingLevel: advanced
  difficulty: intermediate
