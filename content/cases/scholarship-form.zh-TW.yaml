  trustedAdultRecommended: true
messages:
  - id: message.scholarship
    sender: 青年學習基金會
    body: 你的獎學金已通過初審，請在今天 23:00 前繳交 300 元保證金並上傳身分證正反面，才可完成撥款。
    timestamp: '21:02'
    direction: incoming
clues:
  - id: clue.deposit
    label: 先繳保證金才能領獎學金
    explanation: 先付款是高風險要求，應先核對公開的申請規則與聯絡方式。
  - id: clue.identity
    label: 要求上傳完整身分證
    explanation: 在來源與必要性未確認前，不要傳送高敏感個資。
choices:
  - id: choice.trustworthy
    label: 先付 300 元，獎學金比較重要
    classification: trustworthy
    reasoning: 付款與身分證要求都應先獨立查證，不能用「已通過」取代核對。
    score: 0
  - id: choice.fraud
    label: 要先繳保證金才能領獎學金就是詐騙，不付款也不上傳證件
    classification: fraud
    reasoning: 獎助學金是給你錢，不會反過來先跟你收錢；這一點就足以判定，不必等查完主辦單位。
    score: 100
  - id: choice.verify
    label: 先上傳身分證但不付款，看看對方後續怎麼說
    classification: insufficient-evidence
    reasoning: 身分證正反面外流本身就是損失，可能被用來申辦帳戶或貸款，不能當作測試手段。
    score: 15
recommendedActionIds: [anti-fraud.online-report, anti-fraud.consult]
debrief:
  headline: 要你先繳錢的獎學金，一定是假的
  explanation: 獎助學金的性質是撥款給你，任何以保證金、手續費、稅金為名要求先付款的通知都是詐騙。好消息與期限會降低警覺，但這裡不需要猶豫——先收費這一點就足以判定，身分證正反面更不該在這種情況下上傳。
  safeActions:
    - 保留信件與申請紀錄，不先付款或傳證件。
    - 請學校承辦或家人一起核對申請單位。
    - 若已上傳證件，儘快告知家長並留意帳戶與信用異常。
