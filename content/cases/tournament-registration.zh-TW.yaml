title: 電競賽事報名的登入頁
channel: email
classification: fraud
provenance:
  kind: classic-pattern
  note: 改寫以賽事報名或獎金資格引導玩家登入假網站的釣魚手法。
sources: []
learning:
  stages: [7-9]
  dimensions: [prevention, response]
  topic: 遊戲與帳號
  readingLevel: standard
  difficulty: intermediate
  contexts: [電競, Email, 遊戲帳號]
  skills: [獨立查證網址, 辨識急迫話術]
  riskTypes: [假賽事, 釣魚登入]
