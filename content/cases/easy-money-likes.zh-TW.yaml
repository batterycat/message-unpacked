  kind: classic-pattern
  note: 改寫以輕鬆任務、高額點數招募未成年參與刷單的常見手法；本案例取代原本以獎學金投資為題、年齡不符的版本。
sources: []
learning:
  stages: [5-6]
  dimensions: [prevention, response, ethics]
  topic: 投資與廣告
  readingLevel: standard
  difficulty: intermediate
  contexts: [社群廣告, 網路賺錢, 同儕互動]
  skills: [辨認低門檻高報酬, 拒絕先付款, 找可信任的大人]
  riskTypes: [假兼職, 刷單, 預付費用]
