clues:
  - id: clue.deposit
    label: 工作要求先交保證金
    explanation: 正常工作不會要求求職者先匯款才能領薪水。
  - id: clue.high-return
    label: 低門檻高報酬
    explanation: 以簡單任務承諾高額收入，常是誘導付款或洗錢風險。
choices:
  - id: choice.trustworthy
    label: 先借錢交保證金，完成任務就能賺回來
    classification: trustworthy
    reasoning: 先付款與高報酬承諾是高風險訊號，不是正常打工流程。
    score: 0
  - id: choice.fraud
    label: 停止聯絡，不付款並和家人或學校就業窗口確認
    classification: fraud
    reasoning: 你辨識出假打工常用的保證金與不合理報酬。
    score: 100
  - id: choice.verify
    label: 先做第一筆小額任務，看看能不能領薪
    classification: insufficient-evidence
    reasoning: 小額成功可能是誘導加碼，仍不應交出保證金。
    score: 15
debrief:
  headline: 工作不該先收你的錢
  explanation: 假打工常把投資、刷單和保證金包裝成任務。找工作要核對公司、工作內容與薪資流程，不要私下交款。這類任務還有一個比賠錢更嚴重的後果：對方常在下一步要求你提供銀行帳戶「走帳」，或請你代為提領、轉交現金。一旦照做，即使你自己也是被騙的，仍可能被認定為幫助詐欺或洗錢而遭偵辦；未滿 18 歲會依少年事件處理法處理，不會因為年紀而免責。帳戶被列為警示帳戶後，你名下其他帳戶也會連帶受影響，可能持續數年，打工、獎助學金入帳與日常轉帳都會受阻。
  safeActions:
    - 保留職缺、對話與收款要求。
    - 請家人、學校輔導室或可信任的大人一起確認。
    - 絕對不提供自己的帳戶、提款卡或網銀帳密給任何「工作」使用，也不代領、代轉現金。
    - 若已提供帳戶或代領款項，儘快主動向警察機關說明並保留完整對話，主動說明對後續認定有幫助。
