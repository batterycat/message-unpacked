  kind: classic-pattern
  note: 改寫假打工以代操或刷單名義要求學生入金的手法。
sources: []
learning:
  stages: [10-12]
  dimensions: [prevention, response, law]
  topic: 投資與廣告
  readingLevel: advanced
  difficulty: advanced
