messages:
  - id: message.favor
    sender: Marcus (online friend, 4 months)
    body: Random favor — my building keeps having packages stolen. Could I ship a few things to your place? You'd just drop them at UPS with labels I send you. I'll Venmo you $50 each time.
    timestamp: '10:33 PM'
    direction: incoming
  - id: message.quiet
    sender: Marcus (online friend, 4 months)
    body: Probably easier not to mention it to your parents, they'll overthink it. It's literally just packages.
    timestamp: '10:36 PM'
    direction: incoming
clues:
  - id: clue.address
    label: What is being borrowed is your address
    explanation: The packages are almost certainly bought with stolen card numbers. Your address breaks the trail between the theft and the goods, which is the only reason it is worth $50.
  - id: clue.secrecy
    label: You are asked to keep it from your parents
    explanation: A genuine favor between friends survives a parent knowing about it. This request does not, and the sender knows that.
  - id: clue.payment-for-nothing
    label: The pay is far too high for the work
    explanation: Fifty dollars to walk to a shipping store is not generosity. It is the price of the risk being transferred from him to you.
choices:
  - id: choice.trustworthy
    label: Help him out — it is just receiving boxes and he is a friend
    classification: trustworthy
    reasoning: Receiving and reshipping goods bought with stolen cards puts your address in the shipment trail and can expose you to financial loss, account restrictions, and investigation.
    score: 0
  - id: choice.fraud
    label: Refuse, tell a parent despite being asked not to, and stop the conversation
    classification: fraud
    reasoning: You recognized that a stranger paying for the use of your address and asking for secrecy is recruitment, not friendship.
    score: 100
  - id: choice.verify
    label: Agree to do one and see what actually arrives before deciding
    classification: insufficient-evidence
    reasoning: The first package is the one that puts your address in the chain. Whatever is inside, the delivery has already happened by the time you look.
    score: 0
recommendedActionIds: [anti-fraud.online-report, anti-fraud.consult]
debrief:
  headline: When someone pays to use your address or your account, you are the product
  explanation: This shape shows up in several forms — receiving packages, accepting a transfer and sending most of it on, letting someone use your bank account for a few days. The details vary but the structure does not, which is that a stranger needs something to pass through a real person with no record, and you are that person. The delivery address will be one of the first facts investigators can see. A person who was deceived may also be treated as a secondary victim, but the messages, secrecy, payment, and what they did after warning signs will matter. Notice too how the second message did the real work. Being told not to tell your parents is the clearest signal in the whole exchange, and it is precisely the instruction to disobey.
  safeActions:
    - Never receive, forward, or reship packages for an online contact or an employer you have not independently verified.
    - Never let anyone route money through your bank account or payment apps.
    - Tell a parent when someone asks you to keep an arrangement from them.
    - Save the messages and shipping labels, and refuse or return any unexpected package.
