locale: en
status: published
title: Financial Aid Night in the Library
channel: email
classification: trustworthy
provenance:
  kind: fictional
  note: Teaching scenario written as the positive counterpart to student aid scams, so the same subject appears without any of the decisive red flags.
sources: []
learning:
  stages: [10-12]
  dimensions: [prevention]
  topicId: school-learning
  topic: School & Learning
  readingLevel: advanced
  difficulty: intermediate
  contexts: [school announcements, college applications, financial aid]
  skills:
    [
      comparing the request rather than the subject,
