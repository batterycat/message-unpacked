title: 朋友帳號傳來的緊急借款
channel: chat
classification: insufficient-evidence
provenance:
  kind: classic-pattern
  note: 綜整熟人帳號遭冒用、以突發事故要求轉帳的常見手法。
sources: []
learning:
  stages: [7-9]
  dimensions: [prevention, response]
  topic: 社群與交友
  readingLevel: standard
  difficulty: intermediate
  contexts: [社群私訊, 同儕互動, 金錢請求]
