# yaml-language-server: $schema=../case.schema.json
id: elementary-library-reminder.zh-tw
schemaVersion: 1
contentVersion: 1.1.0
translationGroupId: elementary-library-reminder
locale: zh-TW
status: published
title: 圖書館借閱提醒
channel: email
classification: insufficient-evidence
provenance:
  kind: fictional
  note: 為中年級學生建立的教學虛構情境，不使用真實學校與圖書館資料。
sources: []
learning:
  stages: [3-4]
  dimensions: [prevention, response]
  topic: 校園與學習
  readingLevel: easy
  difficulty: intermediate
  contexts: [校園, 電子郵件]
  skills: [檢查請求, 使用既有入口查證]
  riskTypes: [假冒通知, 付款要求]
  sensitiveContent: []
  trustedAdultRecommended: true
messages:
  - id: message.library
    sender: 校園圖書館通知
    body: 你借的《昆蟲的一天》下週三到期，逾期一天會暫停借書一天。借閱紀錄可以在圖書館系統查詢。
    timestamp: 週三 15:40
    direction: incoming
clues:
  - id: clue.no-link
    label: 沒有附連結，也沒有要求付款
    explanation: 這封信沒有叫你點連結或繳錢，危險程度比較低。但這只表示它還沒提出危險要求，不代表寄件者已經確認。
  - id: clue.unknown
    label: 仍然需要確認寄件者
    explanation: 只看到文字還不能證明信件是真的，應和家人、老師或圖書館既有窗口確認。
choices:
  - id: choice.trustworthy
    label: 看起來是圖書館寄的，直接相信就好
    classification: trustworthy
    reasoning: 這封信沒有要你做危險的事，所以相信它不會馬上出問題。但寄件者名稱可以自己填寫，養成用自己知道的入口核對的習慣，下次遇到有要求的信才不會吃虧。
    score: 60
  - id: choice.fraud
    label: 一定是詐騙，直接刪掉不管它
    classification: fraud
    reasoning: 不點連結是對的。但書可能真的快到期了，到校務平台看一眼就知道，逾期反而會被停借。
    score: 60
  - id: choice.verify
    label: 從平常的校務平台查借閱紀錄，再問大人
    classification: insufficient-evidence
    reasoning: 你沒有點陌生連結，而是使用獨立入口查證並請可信任的大人協助。
    score: 100
recommendedActionIds: [anti-fraud.online-report, anti-fraud.consult]
debrief:
  headline: 找到自己的查證入口
  explanation: 有些通知可能是真的，也可能只是冒用名稱。當訊息沒有足夠證據時，使用自己知道的官方入口查證，不要被信件中的連結帶著走。
  safeActions:
    - 使用平常的校務平台或詢問老師、家人。
    - 不付款、不提供密碼，也不要轉傳未確認的訊息。
review:
  lastReviewedAt: 2026-07-20
  maintenanceStatus: active
