title: 群眾募資的高額回饋
channel: email
classification: insufficient-evidence
provenance:
  kind: classic-pattern
  note: 綜整假募資專案以高額回饋和限量名額誘導轉帳的手法。
sources: []
learning:
  stages: [10-12]
  dimensions: [prevention, response, ethics]
  topic: 投資與廣告
  readingLevel: advanced
  difficulty: advanced
  contexts: [群眾募資, 電子郵件, 創業廣告]
  skills: [核對募資平台, 分辨回饋與投資, 拒絕私下轉帳]
  riskTypes: [假募資, 高額回饋, 私下付款]
