messages:
  - id: message.crowdfunding
    sender: 新創專案團隊
    body: 最後 20 個早鳥名額，投入 3,000 元下月回饋 6,000 元，請直接匯入團隊帳戶，不走平台才有優惠。
    timestamp: '20:28'
    direction: incoming
clues:
  - id: clue.return
    label: 承諾短期翻倍回饋
    explanation: 群眾募資的回饋不是保證收益，應理解專案、風險與退款規則。
  - id: clue.off-platform
    label: 要求離開平台私下匯款
    explanation: 離開平台會失去公開紀錄與申訴機制，不能只因折扣就接受。
choices:
  - id: choice.trustworthy
    label: 私下匯款才有優惠，先搶名額
    classification: trustworthy
    reasoning: 限量與翻倍回饋不能合理化私下付款與缺乏平台保障。
    score: 0
  - id: choice.fraud
    label: 承諾翻倍又要求繞過平台匯款，這是詐騙，不參加
    classification: fraud
    reasoning: 「一個月翻倍」不是募資回饋而是投資承諾，加上刻意繞過平台保障，兩者合起來已足以判定。
    score: 100
  - id: choice.verify
    label: 先去募資平台找找這個專案，找得到就照他說的匯款
    classification: insufficient-evidence
    reasoning: 查專案是好習慣，但即使專案真的存在，「不走平台才有優惠」仍然是要你放棄退款與申訴保障。
    score: 15
recommendedActionIds: [anti-fraud.online-report, anti-fraud.consult]
debrief:
  headline: 募資回饋不是保證獲利
  explanation: 群眾募資的回饋是商品或服務，不是投資報酬；「投入 3,000 元下月回饋 6,000 元」本身就不是募資的運作方式。再加上要求繞過平台匯款，就不必再花時間查團隊資料——這兩點已經構成判定。
  safeActions:
    - 不私下匯款或提供金融資料。
    - 所有付款都留在募資平台內，保留退款與申訴紀錄。
    - 分辨清楚「回饋」與「投資報酬」：前者是拿到東西，後者受法律嚴格規範。
