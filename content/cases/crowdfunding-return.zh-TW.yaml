messages:
  - id: message.crowdfunding
    sender: 新創專案團隊
    body: 最後 20 個早鳥名額，投入 3,000 元下月回饋 6,000 元，請直接匯入團隊帳戶，不走平台才有優惠。
    timestamp: '20:28'
    direction: incoming
clues:
  - id: clue.return
    label: 承諾短期翻倍回饋
    explanation: 群眾募資的回饋不是保證收益，應理解專案、風險與退款規則。
  - id: clue.off-platform
    label: 要求離開平台私下匯款
    explanation: 離開平台會失去公開紀錄與申訴機制，不能只因折扣就接受。
choices:
  - id: choice.trustworthy
    label: 私下匯款才有優惠，先搶名額
    classification: trustworthy
    reasoning: 限量與翻倍回饋不能合理化私下付款與缺乏平台保障。
    score: 0
  - id: choice.fraud
    label: 一定是假的，立刻把專案貼出來警告大家
    classification: fraud
    reasoning: 內容高度可疑但仍應先查證，公開指控前要避免散播未證實資訊。
    score: 50
  - id: choice.verify
    label: 不私下匯款，先查募資平台頁面、團隊資料與退款規則
    classification: insufficient-evidence
    reasoning: 先保留資金與判斷空間，用獨立資料確認專案是否可信。
    score: 100
recommendedActionIds: []
debrief:
  headline: 募資回饋不是保證獲利
  explanation: 群眾募資有專案失敗與延期風險。只透過正式平台查看資料與付款，不接受私訊的限量催促。
  safeActions:
    - 不私下匯款或提供金融資料。
    - 先查團隊、專案進度、退款與風險說明。
