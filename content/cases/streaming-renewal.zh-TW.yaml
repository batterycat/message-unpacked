translationGroupId: streaming-renewal
locale: zh-TW
status: published
title: 影音訂閱即將續費
channel: email
classification: fraud
provenance:
  kind: classic-pattern
  note: 綜整假冒影音服務通知自動續費、引導輸入付款資料的手法。
sources: []
learning:
  stages: [5-6]
  dimensions: [prevention, response]
  topicId: family-life
  topic: 家庭與生活
  readingLevel: standard
  difficulty: introductory
  contexts: [家庭訂閱, Email, 影音服務]
  skills: [從帳號內查訂閱, 不沿用郵件連結]
  riskTypes: [假續費通知, 釣魚付款頁]
  sensitiveContent: []
  trustedAdultRecommended: true
messages:
  - id: message.streaming
    sender: 影音會員中心
    body: 你的家庭方案明天將自動續費 399 元，如需取消請登入 https://streaming.example.com 並重新輸入卡號。
    timestamp: '19:22'
    direction: incoming
clues:
  - id: clue.card
    label: 取消訂閱卻要求重新輸入卡號
    explanation: 取消是停止收費，服務商手上已經有你的付款方式，不可能需要你再輸入一次完整卡號。這個矛盾足以判定。
  - id: clue.deadline
    label: 用明天扣款催促
    explanation: 時間壓力會讓人忽略獨立查證帳戶與付款紀錄。
choices:
  - id: choice.trustworthy
    label: 立刻輸入卡號取消，避免被扣款
    classification: trustworthy
    reasoning: 陌生連結與付款資料要求仍需先查證，不能只看扣款金額。
    score: 0
  - id: choice.fraud
    label: 取消訂閱不需要重填卡號，這是釣魚信，改請家人從 App 查
    classification: fraud
    reasoning: 你辨識出「取消卻要卡號」的矛盾，也用原本的帳戶入口處理可能存在的真實訂閱。
    score: 100
  - id: choice.verify
    label: 先點開連結看看頁面長怎樣，不輸入卡號
    classification: insufficient-evidence
    reasoning: 不輸入卡號是對的，但登入頁可以做得跟官方一模一樣，開啟它得不到任何判斷資訊。
    score: 40
debrief:
  headline: 取消訂閱不會要你重新輸入卡號
  explanation: 你家可能真的有這個訂閱，但「要取消就重填卡號」這個要求本身是假的——服務商早就有你的付款方式了。判定訊息是詐騙，和回到 App 確認家裡的訂閱狀況，這兩件事可以同時做。
  safeActions:
    - 不從郵件連結輸入信用卡資料。
    - 請家人一起確認訂閱與付款紀錄。
review:
