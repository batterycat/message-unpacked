title: 直播抽獎的獎品
channel: chat
classification: fraud
provenance:
  kind: classic-pattern
  note: 改寫直播與社群活動以獎品、手續費或帳號驗證為名誘導付款的常見手法。
sources: []
learning:
  stages: [5-6]
  dimensions: [prevention, response]
  topic: 社群與交友
  readingLevel: standard
  difficulty: intermediate
  contexts: [直播平台, 網路活動]
  skills: [辨認付款要求, 查找官方活動規則]
