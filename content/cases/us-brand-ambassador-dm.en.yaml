title: We Picked You as a Brand Ambassador
channel: chat
classification: fraud
provenance:
  kind: classic-pattern
  note: Rewrites the fake brand ambassador scheme that flatters a teen into paying shipping or discount fees for merchandise that never arrives.
sources: []
learning:
  stages: [10-12]
  dimensions: [prevention, ethics]
  topicId: social-relationships
  topic: Social & Friendships
  readingLevel: standard
  difficulty: intermediate
  contexts: [social media, influencer marketing, direct messages]
  skills:
    [
      understanding how sponsorships actually work,
      recognizing flattery as a tool,
      refusing upfront costs,
    ]
