impact:
  eventSummary: The FBI warned that scammers impersonating staffing agencies recruit people for simple repetitive online tasks, then require cryptocurrency deposits to "unlock" higher earnings that can never be withdrawn.
  period: Alert I-060424-PSA, issued June 2024
  location: United States
  nonFinancialImpact: Victims see a fake dashboard showing balances that grow with each deposit, which makes stopping feel like abandoning money they believe they have already earned.
